name: Build and deploy Node.js app to Azure Web App - counsellors-of-india

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set environment variables
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== .next contents ==="
          ls -la .next
          echo ""
          echo "=== standalone ==="
          ls -la .next/standalone
          echo ""
          echo "=== BUILD_ID ==="
          cat .next/BUILD_ID

      - name: Prepare standalone deployment package
        run: |
          mkdir -p deploy

          echo "Copying standalone server..."
          cp -r .next/standalone/. deploy/

          echo "Creating deploy/.next..."
          mkdir -p deploy/.next

          echo "Copying static files..."
          cp -r .next/static deploy/.next/

          echo "Copying server files..."
          cp -r .next/server deploy/.next/

          echo "Copying BUILD_ID..."
          cp .next/BUILD_ID deploy/.next/

          echo "Copying public folder..."
          cp -r public deploy/

          echo "Copying package.json..."
          cp package.json deploy/

      - name: Verify deployment package
        run: |
          echo "=== DEPLOY ROOT ==="
          ls -la deploy

          echo ""
          echo "=== DEPLOY .NEXT ==="
          ls -la deploy/.next

          echo ""
          echo "=== DEPLOY BUILD_ID ==="
          cat deploy/.next/BUILD_ID

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Verify downloaded artifact
        run: |
          echo "=== ROOT FILES ==="
          ls -la

          echo ""
          echo "=== .NEXT ==="
          ls -la .next || true

          echo ""
          echo "=== .NEXT SERVER ==="
          ls -la .next/server || true

          echo ""
          echo "=== BUILD_ID ==="
          cat .next/BUILD_ID || true

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: counsellors-of-india
          slot-name: Production
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B30018024A434004990843E464909E9E }}